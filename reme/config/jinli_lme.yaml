service:
  backend: cli

workspace_dir: ${LME_WORKSPACE_DIR:-datasets/longmemeval/1}
session_dir: history_session
resource_dir: session
daily_dir: daily
digest_dir: ""

jobs:
  auto_memory:
    backend: base
    description: "Extract every raw session into a search-friendly daily note (one note per session)."
    parameters:
      type: object
      properties: { }
    steps:
      - backend: clear_paths_step   # wipe old daily notes so this is a clean rebuild
        config_keys: [daily_dir]
      - backend: lme_auto_memory_step
        agent_wrapper: lme_memory

  update_index:
    backend: base
    watch_dirs: [daily_dir]
    watch_suffixes: [md]
    steps:
      - backend: clear_store_step
      - backend: init_changes_step
        monitor_type: file_store
        monitor_name: default
        dispatch_steps: [update_index_step]

  extract_session_by_id:
    backend: base
    description: "Given a session_id shown in a search result, go back to the original raw session and extract everything in it that is relevant to the current question. Use this when a search hit looks relevant but the distilled note lacks an exact number, date, or wording."
    parameters:
      type: object
      properties:
        session_id:
          type: string
          description: "the session_id from a search result header"
      required:
        - session_id
    steps:
      - backend: lme_extract_session_step
        agent_wrapper: lme_extract

  vector_search:
    backend: base
    description: "Dense semantic search over the memory notes. Returns each hit with its source note path and session_id."
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "search query"
      required:
        - query
    steps:
      - backend: vector_search_step
        include_source: true

  bm25_search:
    backend: base
    description: "Keyword (BM25) search over the memory notes. Returns each hit with its source note path and session_id."
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "search query"
      required:
        - query
    steps:
      - backend: bm25_search_step
        include_source: true

  agentic_answer:
    backend: base
    description: "Answer query.json from indexed memory using vector/bm25 search + session extraction."
    parameters:
      type: object
      properties: { }
    steps:
      - backend: clear_paths_step   # drop the previous answer so each run rewrites cleanly
        paths: [mem_answer.json]
      - backend: lme_agentic_answer_step
        agent_wrapper: lme_agentic_answer

  llm_judge:
    backend: base
    description: "Judge mem_answer.json against answer.json and write the judgement back into mem_answer.json."
    parameters:
      type: object
      properties: { }
    steps:
      - backend: lme_llm_judge_step
        agent_wrapper: lme_judge

  version:
    backend: base
    description: "return reme package version"
    parameters:
      type: object
      properties: { }
    steps:
      - backend: version_step

  search:
    backend: base
    description: "Hybrid workspace search (vector + BM25, RRF-fused)."
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "search query"
        start_date:
          type: string
          description: "optional inclusive start date filter (YYYY-MM-DD); results earlier than this date are excluded"
        end_date:
          type: string
          description: "optional inclusive end date filter (YYYY-MM-DD); results later than this date are excluded"
        vector_weight:
          type: number
          description: >-
            Optional weight balancing vector similarity vs BM25 keyword matching in the
            RRF fusion. Recommended value is 0.7, which provides a good balance between
            semantic (vector) similarity and lexical (BM25) matching. Values close to 0
            emphasize BM25 keyword matching, values close to 1 emphasize vector semantic
            similarity.
      required:
        - query
    steps:
      - backend: search_step
        vector_weight: 0.7
        candidate_multiplier: 5.0
        expand_links: true
        max_links_per_direction: 10

  add_draft:
    backend: base
    description: "Append text to the current draft list."
    parameters:
      type: object
      properties:
        text:
          type: string
          description: "draft text to append"
      required:
        - text
    steps:
      - backend: add_draft_step

  read_all_draft:
    backend: base
    description: "Read all draft text previously appended in the current tool context."
    parameters:
      type: object
      properties: { }
    steps:
      - backend: read_all_draft_step

  python_execute:
    backend: base
    description: "Execute Python code and return printed stdout."
    parameters:
      type: object
      properties:
        code:
          type: string
          description: "Python code to execute. Print the final result to stdout."
        timeout:
          type: number
          description: "Execution timeout in seconds; defaults to 60."
      required:
        - code
    steps:
      - backend: python_execute_step

  session_review:
    backend: base
    description: "Review every session for query/answer-relevant evidence and write session_review.json."
    parameters:
      type: object
      properties: { }
    steps:
      - backend: clear_paths_step   # drop the previous review so each run rewrites cleanly
        paths: [session_review.json]
      - backend: lme_session_review_step
        agent_wrapper: lme_review

  golden_check:
    backend: base
    description: "Read session_review.json and judge whether the golden answer is reasonable."
    parameters:
      type: object
      properties: { }
    steps:
      - backend: clear_paths_step   # drop the previous verdict so each run rewrites cleanly
        paths: [check_golden.json]
      - backend: wait_for_paths_step # wait until session_review finishes; comment this step to fail fast instead
        paths: [session_review.json]
        poll_seconds: 5
        log_every_seconds: 60
      - backend: lme_golden_check_step
        agent_wrapper: lme_judge

  final_answer_review:
    backend: base
    description: "Review one LongMemEval golden answer from all sessions available by question_date."
    parameters:
      type: object
      properties: { }
    steps:
      - backend: lme_final_answer_review_step
        agent_wrapper: lme_final_answer_review
        reference_paths:
          - benchmark/longmemeval/golden_check_list_false.jsonl
          - benchmark/longmemeval/merge_confirm_jinli_false.jsonl
        retry_initial_seconds: 5
        retry_max_seconds: 300

components:
  tokenizer:
    default:
      backend: regex

  as_embedding:
    default:
      backend: ${EMBEDDING_BACKEND:-openai}
      model: ${EMBEDDING_MODEL_NAME:-text-embedding-v4}
      dimensions: 1024
      credential:
        api_key: ${EMBEDDING_API_KEY:-}
        base_url: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      parameters: { }

  embedding_store:
    default:
      backend: local
      as_embedding: default

  as_llm:
    default:
      backend: ${LLM_BACKEND:-openai}
      model: ${LLM_MODEL_NAME:-qwen3.7-max}
      stream: true
      context_size: 1000000
      max_retries: 3
      credential:
        api_key: ${LLM_API_KEY:-}
        base_url: ${LLM_BASE_URL:-}
      parameters:
        max_tokens: 65536

    plus:
      backend: ${LLM_BACKEND:-openai}
      model: qwen3.7-plus
      stream: true
      context_size: 1000000
      max_retries: 3
      credential:
        api_key: ${LLM_API_KEY:-}
        base_url: ${LLM_BASE_URL:-}
      parameters:
        max_tokens: 65536

  agent_wrapper:
    default:
      backend: agentscope
      as_llm: default
      permission_mode: bypass
      react_config:
        max_iters: 30
      context_config:
        trigger_ratio: 0.89
        reserve_ratio: 0.1
        tool_result_limit: 50000
      model_config:
        max_retries: 3

    agentic_search_agentwrapper:
      backend: agentscope
      as_llm: default
      cwd: session
      permission_mode: bypass
      builtin_tools: false
      job_tools:
        - search
        - add_draft
        - read_all_draft
        - python_execute
      sequential_tool_calls: true
      react_config:
        max_iters: 100
      context_config:
        trigger_ratio: 0.89
        reserve_ratio: 0.1
        tool_result_limit: 1000000
      model_config:
        max_retries: 3

    lme_memory:
      backend: agentscope
      as_llm: plus
      permission_mode: bypass
      builtin_tools: false
      react_config:
        max_iters: 8
      context_config:
        trigger_ratio: 0.89
        reserve_ratio: 0.1
        tool_result_limit: 1000000
      model_config:
        max_retries: 3

    lme_extract:
      backend: agentscope
      as_llm: plus
      permission_mode: bypass
      builtin_tools: false
      react_config:
        max_iters: 3
      context_config:
        trigger_ratio: 0.89
        reserve_ratio: 0.1
        tool_result_limit: 1000000
      model_config:
        max_retries: 3

    lme_agentic_answer:
      backend: agentscope
      as_llm: default
      cwd: session
      permission_mode: bypass
      builtin_tools: false
      job_tools:
        - vector_search
        - bm25_search
        - python_execute
        - extract_session_by_id
      sequential_tool_calls: true
      react_config:
        max_iters: 40
      context_config:
        trigger_ratio: 0.89
        reserve_ratio: 0.1
        tool_result_limit: 1000000
      model_config:
        max_retries: 3

    claude_code:
      backend: claude_code
      model: ${CLAUDE_CODE_MODEL_NAME:-glm-5.2}
      api_key: ${CLAUDE_CODE_API_KEY:-}
      base_url: ${CLAUDE_CODE_BASE_URL:-https://dashscope.aliyuncs.com/apps/anthropic}
      permission_mode: bypassPermissions

    lme_final_answer_review:
      backend: claude_code
      model: ${CLAUDE_CODE_MODEL_NAME:-claude-opus-4-8}
      api_key: ${CLAUDE_CODE_API_KEY:-}
      base_url: ${CLAUDE_CODE_BASE_URL:-}
      cwd: session
      permission_mode: bypassPermissions

    lme_review:
      backend: agentscope
      as_llm: plus
      permission_mode: bypass
      builtin_tools: false
      react_config:
        max_iters: 10
      context_config:
        trigger_ratio: 0.89
        reserve_ratio: 0.1
        tool_result_limit: 1000000
      model_config:
        max_retries: 3

    lme_judge:
      backend: agentscope
      as_llm: default
      permission_mode: bypass
      builtin_tools: false
      job_tools:
        - python_execute
      sequential_tool_calls: true
      react_config:
        max_iters: 50
      context_config:
        trigger_ratio: 0.89
        reserve_ratio: 0.1
        tool_result_limit: 1000000
      model_config:
        max_retries: 3

  file_graph:
    default:
      backend: local

  file_chunker:
    markdown:
      backend: markdown
      supported_extensions: [ "md" ]
    default:
      backend: default
      supported_extensions: [ "json", "jsonl" ]
      chunk_byte_size: 100000

  keyword_index:
    default:
      backend: bm25
      tokenizer: default

  file_store:
    default:
      backend: local
      store_name: local
      embedding_store: default
#      embedding_store: ""
      keyword_index: default
      file_graph: default
